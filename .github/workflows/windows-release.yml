name: Build Windows & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v2.0.11"
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: go_decrypt/go.sum

      - name: Install w64devkit
        shell: pwsh
        run: |
          $version = "1.22.0"
          $zip = "w64devkit-$version.zip"
          $url = "https://github.com/skeeto/w64devkit/releases/download/v$version/$zip"
          curl.exe -L --fail --retry 3 --connect-timeout 30 -o $zip $url
          tar -xf $zip
          "$pwd\w64devkit\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Go decrypt DLL
        shell: cmd
        run: |
          set "CC=%GITHUB_WORKSPACE%\w64devkit\bin\gcc.exe"
          set "GOPROXY=https://goproxy.cn,direct"
          pushd go_decrypt
          call build.bat
          popd

      - run: flutter clean
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Build zip
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $src = "build/windows/x64/runner/Release"
          $zip = "WeTrace-windows-$tag.zip"
          if (!(Test-Path $src)) { dir build/windows -Recurse; throw "build output not found" }
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$src/*" -DestinationPath $zip -Force
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build msix
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $v = $tag.TrimStart("v")
          $msixVersion = "$v.0"

          dart run msix:create --version $msixVersion --install-certificate false

          $out = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1
          if (!$out) { throw "msix not found" }

          $name = "WeTrace-windows-$tag.msix"
          if (Test-Path $name) { Remove-Item $name -Force }
          Move-Item $out.FullName $name

          "MSIX_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

          
      - name: Build release body
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("child_process");
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const tags = execSync("git tag --sort=-creatordate").toString().trim().split("\n").filter(Boolean);
            const idx = tags.indexOf(tag);
            const prev = idx >= 0 && idx + 1 < tags.length ? tags[idx + 1] : null;
            const gen = await github.request("POST /repos/{owner}/{repo}/releases/generate-notes", {
              owner,
              repo,
              tag_name: tag,
              previous_tag_name: prev || undefined
            });
            let body = gen.data.body || "";
            if (prev) {
              const cmp = await github.request("GET /repos/{owner}/{repo}/compare/{base}...{head}", {
                owner,
                repo,
                base: prev,
                head: tag
              });
              body += "\n\n---\n\n## Commits\n";
              body += (cmp.data.commits || [])
                .map(c => `- ${c.commit.message.split("\n")[0]} (${c.sha.slice(0,7)}) ${c.html_url}`)
                .join("\n");
            }
            fs.writeFileSync("RELEASE_NOTES.md", body);

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.MSIX_NAME }}
